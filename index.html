<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Cost Calculator</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>Cloud Cost Calculator</h1>
<p>Estimate your monthly cloud infrastructure cost</p>
</header>

<div class="container">

<label>Number of Virtual Machines:</label>
<input type="number" id="vm" placeholder="Enter VM count">

<label>Storage (GB):</label>
<input type="number" id="storage" placeholder="Enter storage size">

<button onclick="calculateCost()">Calculate Cost</button>

<div id="loading" style="display:none;">Calculating...</div>

<h2 id="result"></h2>

</div>

<footer>
<p>DevOps Project - Azure Static Website</p>
</footer>

<script src="calculator.js"></script>

</body>
</html>
